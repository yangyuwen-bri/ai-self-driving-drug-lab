services:
  - type: web
    name: ai-self-driving-drug-lab
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /_stcore/health
    envVars:
      - key: PORT
        value: "10000"
      - key: SDL_DB_PATH
        value: /app/outputs/sdl_lab.db
      - key: SDL_REPORT_DIR
        value: /app/outputs
    disk:
      name: sdl-outputs
      mountPath: /app/outputs
      sizeGB: 1
